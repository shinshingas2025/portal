<HTML><HEAD><TITLE>插入表格</TITLE>
<META http-equiv=Content-Type content="text/html; charset=big5">
<STYLE type=text/css>BODY {
	FONT-SIZE: 12px; FONT-FAMILY: 細明體
}
TD {
	FONT-SIZE: 12px; FONT-FAMILY: 細明體
}
.cmdbtn {
	WIDTH: 45px; HEIGHT: 20px
}
.hole {
	FONT-SIZE: 10px; WIDTH: 24px; FONT-FAMILY: arial; HEIGHT: 18px; TEXT-ALIGN: right
}
DIV {
	CURSOR: default
}
</STYLE>

<SCRIPT language=javascript>
function TableOK(){
var dotable,tmpcol,tmprow,docol,dorow
if(tba[0].checked){algn="left";} 
if(tba[1].checked){algn="center";} 
if(tba[2].checked){algn="right";} 
tmpcol="<td align="+algn+"></td>";
docol=""
dorow=""
for ( var i=0; i<tbc.value; i++ ){
docol=docol+tmpcol;
}
docol="<tr>"+docol+"</tr>"
for ( var j=0; j<tbr.value; j++ ){
dorow=dorow+docol;
}
dotable="<table border="+tbb.value+" cellspacing="+tbs.value+" cellpadding="+tbp.value+">"+dorow+"</table>"
window.returnValue = dotable;
window.close();
}
</SCRIPT>

<SCRIPT language=VBScript>
Sub TabStrip_Change()
if (TabStrip.Value = 0) then
Page1.style.visibility = "hidden"
Page0.style.visibility = "visible"
end if
if (TabStrip.Value = 1) then
Page0.style.visibility = "hidden"
Page1.style.visibility = "visible"
end if
end sub
</SCRIPT>

<META content="MSHTML 6.00.3790.2491" name=GENERATOR></HEAD>

  <TR>

      onkeypress="if (event.keyCode < 45 || event.keyCode > 57) event.returnValue = false;" 
      maxLength=2 size=2 value=2 name=tbr></TD>
    <TD>列</TD></TR></TBODY></TABLE></DIV>

      onkeypress="if (event.keyCode < 45 || event.keyCode > 57) event.returnValue = false;"

    <TD>px</TD></TR>
  <TR>
    <TD>欄位對齊：</TD>
    <TD colSpan=2><INPUT type=radio CHECKED name=tba>左<INPUT type=radio 
      name=tba>中<INPUT type=radio name=tba>右</TD></TR></TBODY></TABLE></DIV>
<DIV
