		<h1>
			GetUsers 預存程序
		</h1>
		<b>說明：</b>
		<P>
			此預存程序傳回所有註冊使用者的「使用者識別碼」、「名稱」與「電子郵件地址」。
		</P>
		<b>定義：</b>
		<pre>
    
   CREATE PROCEDURE Portal_GetUsers
   AS
   
   SELECT  
       UserID,
       Email
   
   FROM Portal_Users
       
   ORDER BY Email
        </pre>
		<b>使用的資料庫資料表： </b>
		<P>
			<i>Users：</i>Users 資料表中的每項記錄都是唯一使用者識別項。此資料表的主索引鍵為 UserID 識別欄位。

			<img src="../docs/images/1x1.gif" width="25"> <IMG src="../docs/images/users.jpg">
		</p>
